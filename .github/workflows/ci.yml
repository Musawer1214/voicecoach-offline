name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-build-package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Package unpacked Windows app
        run: npm run package:dir

      - name: Upload unpacked app artifact
        uses: actions/upload-artifact@v4
        with:
          name: voicecoach-offline-win-unpacked
          path: release/win-unpacked
